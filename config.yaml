env:
  max_steps: 1000
  dt: 0.033
  fov: 1.57 # 90 градусов
  max_ang_vel: 1.0
  fire_threshold: 0.0
  projectile_speed: 150.0  # Скорость пули должна быть высокой
  projectile_max_dist: 250.0
  asteroid_radius: 4.0
  impact_radius: 20.0
  max_asteroids: 5
  spawn_prob: 0.05
  world_width: 120.0
  world_height: 120.0
  spawn_y: 200.0
  spawn_x_range: 12.0
  spawn_z_center: 50.0
  spawn_z_range: 12.0
  spawn_z_min: 20.0
  spawn_z_max: 80.0
  asteroid_speed_y_min: 8.0
  asteroid_speed_y_max: 16.0
  asteroid_speed_xz_max: 7.0
  reward_hit: 10.0
  reward_impact: -10.0
  reward_shot: 0.0

agent:
  gamma: 0.99
  tau: 0.005
  alpha: 0.1
  lr: 1.e-4
  batch_size: 256
  buffer_size: 200000
  start_steps: 20000

train:
  episodes: 100
  seed: 42
  eval_episodes: 3
  log_window: 10

run:
  mode: baseline  # manual | baseline | agent
  renderer: 3d
  fps: 30
  stochastic_agent: true
  do_gif: true
  gif_directory: tmp_gif  # tmp_gif | important_gif
  gif_name: run_baseline_30fps.gif
  gif_fps: 30

  # fps -- частота кадров для рендера
  # do_gif -- сохранять ли гифку
  # gif_directory -- папка для сохранения гифки - в important_gif обязательно содержательное название
  # tmp_gif лжит в giтигноре, поэтому не загружается на гит

  # gif_fps -- частота кадров для гифки
  # го договоримся что в important_gif будем 30 fps, а для себя какой хотите (чтоб ускорить созранение)
